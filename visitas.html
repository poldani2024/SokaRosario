
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visitas — Soka Gakkai Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="styles.mobile.v3.css">
  <style>
    #visitaForm.visita-form {
      display: block;
    }
    #visitaForm .visita-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 12px;
      align-items: start;
    }
    #visitaForm .visita-grid label {
      margin: 0;
    }
    #visitaForm .visita-grid .full-row {
      grid-column: 1 / -1;
    }
    #visitaForm .visita-grid textarea {
      min-height: 92px;
    }
    #visitaSubmitBtn {
      grid-column: 1 / -1;
      width: 100%;
      margin-top: 4px;
    }
    @media (max-width: 760px) {
      #visitaForm .visita-grid {
        grid-template-columns: 1fr;
      }
      #visitaForm .visita-grid .full-row {
        grid-column: 1;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Registro de Visitas</h1>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="personas.html">Personas</a>
      <a href="estadisticas.html">Estadísticas</a>
      <a href="reportes.html">Reportes</a>
    </nav>
    <section class="auth">
      <div id="login-form">
        <p>Necesitás iniciar sesión con Google para acceder.</p>
        <button id="googleLoginBtn">Ingresar con Google</button>
      </div>
      <div id="user-info" class="hidden">
        <span id="user-email"></span> — <strong id="role-badge"></strong>
        <button id="logoutBtn" class="secondary" style="margin-left:8px;">Cerrar sesión</button>
      </div>
    </section>
  </header>

  <main class="container">
    <section id="visitas" class="panel">
      <h2>Visitas</h2>
      <form id="visitaForm" class="card visita-form">
        <div class="visita-grid">
          <label>Persona
            <input id="visitaPersonaInput" type="text" list="visitaPersonaSuggestions" placeholder="Escribí nombre o apellido">
            <datalist id="visitaPersonaSuggestions"></datalist>
            <input id="visitaPersonaId" type="hidden">
          </label>
          <label>Tipo de contacto
            <select id="visitaTipoContacto">
              <option value="">Seleccionar...</option>
              <option>Visita</option>
              <option>Dmk Contacto</option>
              <option>WhatsApp</option>
              <option>Actividad</option>
              <option>Otro</option>
            </select>
          </label>
          <label id="visitaTipoOtroWrap" class="hidden">Detalle de “Otro”
            <input id="visitaTipoOtro" type="text" placeholder="Especificar tipo de contacto">
          </label>
          <label>Fecha de visita
            <input id="visitaFecha" type="text" inputmode="numeric" placeholder="DD/MM/YYYY">
          </label>
          <label class="full-row">Observaciones
            <textarea id="visitaObs" rows="3"></textarea>
          </label>
          <button id="visitaSubmitBtn" type="submit">Registrar visita</button>
        </div>
      </form>

      <div class="table-wrap">
        <table id="visitasTable">
          <thead>
            <tr>
              <th>Persona</th>
              <th>Tipo de contacto</th>
              <th>Fecha</th>
              <th>Observaciones</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>
    <p>Hecho con ❤️ — Soka Gakkai Tracker</p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script src="visitas.js"></script>
</body>
</html>
